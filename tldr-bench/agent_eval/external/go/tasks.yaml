- id: go-cmp-equate-empty
  title: Keep EquateEmpty scoped to two empty collections
  category: diff_regression
  eligible_for_tldrs: true
  prompt: >-
    EquateEmpty should treat nil and empty slices or maps as equal, but it must
    not ignore a non-empty collection when the other side is empty. Restore
    that boundary for both collection kinds.
  mutation: mutations/equate-empty.yaml
  grader: graders/equate_empty.py
  verification_command: go test ./cmp/cmpopts

- id: go-cmp-equate-approx
  title: Honor either relative or absolute approximation margin
  category: cross_file_bug
  eligible_for_tldrs: true
  prompt: >-
    Approximate float comparison should accept values when either the relative
    fraction or the absolute margin covers their difference. Values covered by
    the absolute margin are currently rejected when the relative threshold is
    smaller. Restore the documented tolerance rule for float32 and float64.
  mutation: mutations/equate-approx.yaml
  grader: graders/equate_approx.py
  verification_command: go test ./cmp/cmpopts
